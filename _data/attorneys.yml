- name: Mark Stanczak 
  bio:  Mark P. Stanczak is an attorney and former software and cybersecurity engineer with 15 years of hands-on experience building and architecting complex systems. He has advised engineers on implementation, coding practices, and technical standards — experience that directly shapes how he approaches every legal matter. Mark focuses on cybersecurity, data privacy, and technology-related matters — including contracts, misrepresentation, and regulatory compliance under CCPA, GDPR, HIPAA, and related frameworks. Admitted to the California State Bar and the U.S. District Court for the Central District of California.
